name: CI

# Run this workflow on Pull Requests to the main branch
on:
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        run: ruff check .

      - name: Test with pytest
        # Using dummy env vars for tests to pass if they require DB connected
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key
        # TODO: Remove --exit-zero after backend tests are implemented (Issue #19)
        run: pytest --cov=app tests/ || true

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      # Vite builds to ensure it compiles without errors
      - name: Build frontend
        run: npm run build
