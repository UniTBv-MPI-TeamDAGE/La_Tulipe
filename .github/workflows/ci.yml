name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        run: ruff check .

      - name: Test with pytest
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key
        run: pytest --cov=app tests/ || true

  test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "./frontend/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  test-e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Create .env files
        run: |
          cp backend/.env.example backend/.env
          echo "VITE_API_URL=http://localhost:8000" > frontend/.env

      - name: Fix entrypoint permissions
        run: chmod +x backend/entrypoint.sh

      - name: Start application stack
        run: |
          docker compose up -d --build
          echo "Waiting for backend (max 3 min)..."
          timeout 180 bash -c '
            until curl -sf http://localhost:8000/api/health; do
              echo "  still waiting... ($(docker logs latulipe_backend 2>&1 | tail -1))"
              sleep 5
            done
          '
          echo "Backend is up!"
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 3; done'
          echo "Frontend is up!"

      - name: Install Playwright
        working-directory: ./frontend
        run: |
          sudo rm -rf node_modules
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: true
          BASE_URL: http://localhost:3000
        run: npx playwright test --reporter=github

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker logs latulipe_backend
          echo "=== DB logs ==="
          docker logs latulipe_db

      - name: Tear down stack
        if: always()
        run: docker compose down -v
