server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend
    location /api/ {
        proxy_pass https://la-tulipe-backend.mangograss-ca206046.switzerlandnorth.azurecontainerapps.io;
        proxy_set_header Host la-tulipe-backend.mangograss-ca206046.switzerlandnorth.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
    }

    # React Router — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}